<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StreetFit Society</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:black;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ff2e2e;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
}

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url("https://images.unsplash.com/photo-1520975922071-4c61e0b0d97b") center/cover;
}

.hero h1{
font-size:60px;
}

.hero p{
font-size:20px;
color:#ccc;
}

button{
padding:15px 35px;
background:#ff2e2e;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.products{
padding:50px;
display:flex;
justify-content:center;
gap:40px;
}

.card{
background:#141414;
padding:20px;
width:250px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:10px;
}

footer{
padding:30px;
text-align:center;
background:black;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<div class="logo">StreetFit Society</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Help</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">

<h1>StreetFit Society</h1>
<p>Can't Handle The Heat</p>

<button>Shop Now</button>

</section>

<section class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990">

<h3>Black Oversized T-Shirt</h3>

<p>₹4999</p>

<button>Add to Cart</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0">

<h3>black Sweatpants</h3>

<p>₹799</p>

<button>Add to Cart</button>

</div>

</section>

<footer>

<p>Delivery Available in Delhi</p>

<p>Payments: UPI • Debit Card • Credit Card</p>

<p>Follow us on Instagram & Pinterest</p>

</footer>

</body>
</html>
